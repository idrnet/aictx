<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Contact — aictx</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #333; max-width: 480px; margin: 0 auto; padding: 24px; line-height: 1.6; }
        header { border-bottom: 1px solid #eee; padding-bottom: 12px; margin-bottom: 24px; }
        header a { font-family: Georgia, serif; font-size: 16px; font-weight: 600; color: #333; text-decoration: none; }
        h1 { font-size: 24px; margin-bottom: 16px; }
        label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 4px; margin-top: 16px; }
        input, textarea { width: 100%; padding: 8px 12px; font-size: 14px; border: 1px solid #ddd; border-radius: 6px; font-family: inherit; }
        input:focus, textarea:focus { outline: none; border-color: #0066cc; }
        textarea { resize: vertical; min-height: 100px; }
        button { margin-top: 20px; padding: 10px 24px; font-size: 14px; font-weight: 500; background: #333; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
        button:hover { background: #555; }
        .note { font-size: 12px; color: #999; margin-top: 12px; }
    </style>
</head>
<body>
    <header><a href="/">aictx</a></header>

    <h1>Contact</h1>

    <form action="https://formspree.io/f/placeholder" method="POST">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>

        <label for="subject">Subject</label>
        <input type="text" id="subject" name="subject" value="Privacy / Data Request" required>

        <label for="message">Message</label>
        <textarea id="message" name="message" required></textarea>

        <button type="submit">Send</button>
    </form>

    <p class="note">For GDPR data requests (access, rectification, erasure), please include your full name and the service you used.</p>
</body>
</html>
